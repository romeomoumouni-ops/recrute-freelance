<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Connexion — recrutefreelance.com</title>
  <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@400;500;600;700;800&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="assets/styles.css">
</head>
<body>

  <header class="header">
    <div class="container header-inner">
      <a class="logo" href="index.html">recrute<span>freelance</span></a>
      <div class="header-actions" id="header-actions"></div>
    </div>
  </header>

  <div class="auth-wrap">
    <div class="auth-card">
      <h1>Se connecter</h1>
      <p class="sub">Heureux de vous revoir.</p>

      <form onsubmit="login(event)">
        <div class="field">
          <label for="email">Adresse e-mail</label>
          <input id="email" type="email" required placeholder="vous@exemple.com">
        </div>
        <div class="field">
          <label for="password">Mot de passe</label>
          <input id="password" type="password" required placeholder="Votre mot de passe">
        </div>
        <button class="btn btn-dark btn-block" type="submit">Se connecter</button>
      </form>

      <p class="auth-alt">Pas encore de compte ? <a href="inscription.html">S'inscrire gratuitement</a></p>
    </div>
  </div>

  <script src="assets/app.js"></script>
  <script>
    function login(e) {
      e.preventDefault();
      // Prototype : si un compte existe en local on le réutilise, sinon on crée un compte client de démo
      const email = document.getElementById('email').value.trim();
      let user = getUser();
      if (!user || user.email !== email) {
        user = { prenom: email.split('@')[0], email: email, role: 'client', pays: null, momo: null };
      }
      setUser(user);
      location.href = 'dashboard.html';
    }
  </script>
</body>
</html>
